spring:
  application:
    name: smart-accounting-master-data-test
  datasource:
    url: jdbc:h2:mem:smart_accounting
    driver-class-name: org.h2.Driver
    username: sa
    password:

    h2:
      console:
        enabled: true
        path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true